<body class="flex justify-center min-h-screen text-gray-800">

        <!-- 學歷與經歷 (為 EMBA 學長姐特別設計) -->

            <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm space-y-4">

                    </div>
                    <div class="text-sm text-gray-700 flex-1">

                    </div>
                    <div class="flex gap-2">

                    </div>

        <!-- 專屬網頁 QR Code 區塊 -->

                <!-- 自動生成 QR Code (指向您的 GitHub Pages) -->

                         alt="GitHub Pages QR Code" 
                         class="w-36 h-36 mx-auto">

        <!-- 底部版權 -->
        <div class="text-center text-xs text-gray-400 mt-8 pb-4">
            &copy; <script>document.write(new Date().getFullYear())</script> Eric Lin. All rights reserved.
        </div>

    </main>

    <!-- 訊息提示框 -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        已複製到剪貼簿
    </div>

    <script>
        // 複製文字功能
        function copyText(text, type) {
            // 建立臨時的 textarea 元素來執行複製 (相容性較好)
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(`已複製 ${type}: ${text}`);
            } catch (err) {
                console.error('複製失敗', err);
                showToast('複製失敗，請手動複製');
            }
            document.body.removeChild(textArea);
        }

        // 顯示提示訊息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // 產生並下載 vCard (.vcf 檔案) 供一鍵加入通訊錄
        function downloadVCard() {
            const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:林育澤
N:林;育澤;;;
NICKNAME:Eric 好立刻
ORG:仁寶電腦 COMPAL;智慧型裝置事業群 SDBG
TITLE:
TEL;TYPE=CELL,VOICE:0910-136-822
EMAIL;TYPE=WORK,INTERNET:eric.ytlin@gmail.com
URL:https://ericytlin.github.io
ADR;TYPE=WORK:;;陽光街385號;內湖區;台北市;;台灣
NOTE:政大 EMBA 105級文科資創組 / Line ID: eric.ytlin / WeChat: ericytlin
END:VCARD`;

            const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', '林育澤_Eric.vcf');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('正在下載名片聯絡人資訊...');
        }
    </script>
</body>
</html>
